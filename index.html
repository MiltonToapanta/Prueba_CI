<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consulta Cédula Ecuador PRO</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
width:520px;
padding:30px;
border-radius:12px;
box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

h1{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:12px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#203a43;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2c5364;
}

.result{
margin-top:20px;
background:#f5f5f5;
padding:15px;
border-radius:6px;
font-size:14px;
}

textarea{
width:100%;
height:150px;
margin-top:15px;
}

.data{
margin-bottom:5px;
}

</style>

</head>

<body>

<div class="container">

<h1>Consulta Cédula Ecuador 🇪🇨</h1>

<label>Cédula</label>
<input id="cedula">

<button onclick="consultar()">Consultar</button>

<div id="datos" class="result"></div>

<textarea id="json"></textarea>

</div>

<script>

const provincias={
1:"Azuay",
2:"Bolívar",
3:"Cañar",
4:"Carchi",
5:"Cotopaxi",
6:"Chimborazo",
7:"El Oro",
8:"Esmeraldas",
9:"Guayas",
10:"Imbabura",
11:"Loja",
12:"Los Ríos",
13:"Manabí",
14:"Morona Santiago",
15:"Napo",
16:"Pastaza",
17:"Pichincha",
18:"Tungurahua",
19:"Zamora Chinchipe",
20:"Galápagos",
21:"Sucumbíos",
22:"Orellana",
23:"Santo Domingo",
24:"Santa Elena"
}

const estadoCivil={
1:"SOLTERO",
2:"CASADO",
3:"DIVORCIADO",
4:"VIUDO",
5:"UNION DE HECHO",
6:"SOLTERO"
}

function region(prov){

if([7,8,9,12,13,23,24].includes(prov))
return "Costa"

if([1,2,3,4,5,6,10,11,17,18].includes(prov))
return "Sierra"

if([14,15,16,19,21,22].includes(prov))
return "Amazonía"

if(prov==20)
return "Galápagos"

return "Desconocida"
}

async function consultar(){

const cedula=document.getElementById("cedula").value

const proxy="https://infoplacas.herokuapp.com/"
const url="https://si.secap.gob.ec/sisecap/logeo_web/json/busca_persona_registro_civil.php"

const data=new URLSearchParams({
documento:cedula,
tipo:1
})

try{

const res=await fetch(proxy+url,{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:data
})

const text=await res.text()

document.getElementById("json").value=text

const j=JSON.parse(text)

const prov=parseInt(j.provNacimiento)

const html=`

<div class="data"><b>Cédula:</b> ${j.cedula}</div>
<div class="data"><b>Nombre:</b> ${j.nombreCompleto}</div>
<div class="data"><b>Nombres:</b> ${j.nombres}</div>
<div class="data"><b>Apellidos:</b> ${j.apellidos}</div>

<hr>

<div class="data"><b>Sexo:</b> ${j.sexo}</div>
<div class="data"><b>Edad:</b> ${j.edad}</div>
<div class="data"><b>Fecha nacimiento:</b> ${j.fechaNacimiento}</div>

<hr>

<div class="data"><b>Provincia nacimiento:</b> ${provincias[prov]}</div>
<div class="data"><b>Región:</b> ${region(prov)}</div>

<hr>

<div class="data"><b>Estado civil:</b> ${estadoCivil[j.estadoCivilId] || "No disponible"}</div>
<div class="data"><b>Nacionalidad:</b> ECUATORIANA</div>

<hr>

<div class="data"><b>Padre:</b> ${j.nombrePadre || "No disponible"}</div>
<div class="data"><b>Madre:</b> ${j.nombreMadre || "No disponible"}</div>

`

document.getElementById("datos").innerHTML=html

}catch(e){

document.getElementById("datos").innerHTML="Error al consultar"

}

}

</script>

</body>

</html>
