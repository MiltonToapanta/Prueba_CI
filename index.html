<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consulta Cédula Ecuador | Grupo Consulteg</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

header{
background:#0b132b;
color:white;
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
max-width:800px;
margin:30px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
margin-top:10px;
width:100%;
padding:12px;
background:#1d3557;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#457b9d;
}

.card{
background:#f7f7f7;
padding:20px;
border-radius:8px;
margin-top:20px;
}

.card h3{
margin-top:0;
border-bottom:1px solid #ddd;
padding-bottom:5px;
}

.data{
margin:8px 0;
font-size:15px;
}

.success{
color:green;
font-weight:bold;
}

.error{
color:red;
font-weight:bold;
}

textarea{
width:100%;
height:200px;
margin-top:20px;
}

footer{
text-align:center;
margin-top:20px;
font-size:13px;
color:#555;
}

</style>

</head>

<body>

<header>
Consulta Cédula Ecuador 🇪🇨 | Grupo Consulteg
</header>

<div class="container">

<label>Ingrese número de cédula</label>
<input id="cedula" maxlength="10" placeholder="Ej: 1726878505">

<button onclick="consultar()">Consultar</button>

<div id="estado"></div>

<div class="card">

<h3>Datos Personales</h3>

<div class="data"><b>Cédula:</b> <span id="cedula_r"></span></div>
<div class="data"><b>Nombre completo:</b> <span id="nombre"></span></div>
<div class="data"><b>Nombres:</b> <span id="nombres"></span></div>
<div class="data"><b>Apellidos:</b> <span id="apellidos"></span></div>
<div class="data"><b>Sexo:</b> <span id="sexo"></span></div>
<div class="data"><b>Edad:</b> <span id="edad"></span></div>
<div class="data"><b>Fecha nacimiento:</b> <span id="nacimiento"></span></div>

</div>

<div class="card">

<h3>Información Civil</h3>

<div class="data"><b>Estado civil:</b> <span id="estado_civil"></span></div>
<div class="data"><b>Nacionalidad:</b> <span id="nacionalidad"></span></div>
<div class="data"><b>Profesión:</b> <span id="profesion"></span></div>
<div class="data"><b>Instrucción:</b> <span id="instruccion"></span></div>
<div class="data"><b>Fecha cedulación:</b> <span id="cedulacion"></span></div>

</div>

<h3>Respuesta completa API</h3>
<textarea id="json"></textarea>

<footer>
Sistema de consulta | Grupo Consulteg
</footer>

</div>

<script>

const estadoCivil={
1:"Soltero",
2:"Casado",
3:"Divorciado",
4:"Viudo",
5:"Unión de hecho",
6:"Soltero"
}

function txt(v){
return v ? v : "No disponible"
}

async function consultar(){

const cedula=document.getElementById("cedula").value

const proxy="https://infoplacas.herokuapp.com/"
const url="https://si.secap.gob.ec/sisecap/logeo_web/json/busca_persona_registro_civil.php"

const data=new URLSearchParams({
documento:cedula,
tipo:1
})

try{

const res=await fetch(proxy+url,{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:data
})

const text=await res.text()

document.getElementById("json").value=text

const j=JSON.parse(text)

document.getElementById("estado").innerHTML="<p class='success'>Consulta realizada correctamente</p>"

document.getElementById("cedula_r").innerText=txt(j.cedula)
document.getElementById("nombre").innerText=txt(j.nombreCompleto)
document.getElementById("nombres").innerText=txt(j.nombres)
document.getElementById("apellidos").innerText=txt(j.apellidos)
document.getElementById("sexo").innerText=txt(j.sexo)
document.getElementById("edad").innerText=txt(j.edad)
document.getElementById("nacimiento").innerText=txt(j.fechaNacimiento)

document.getElementById("estado_civil").innerText=estadoCivil[j.estadoCivilId] || "No disponible"
document.getElementById("nacionalidad").innerText="ECUATORIANA"
document.getElementById("profesion").innerText=txt(j.profesion)
document.getElementById("instruccion").innerText=txt(j.instruccion)
document.getElementById("cedulacion").innerText=txt(j.fechaCedulacion)

}catch(e){

document.getElementById("estado").innerHTML="<p class='error'>Error al consultar</p>"

}

}

</script>

</body>

</html>
