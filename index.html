<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consulta Cédula Ecuador</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#1d3557,#457b9d);
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:30px;
border-radius:12px;
width:450px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
text-align:center;
margin-bottom:20px;
color:#1d3557;
}

label{
font-weight:bold;
}

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

input:disabled{
background:#f2f2f2;
}

button{
width:100%;
padding:12px;
background:#1d3557;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#457b9d;
}

#output{
margin-top:15px;
padding:10px;
border-radius:6px;
background:#f4f4f4;
font-size:14px;
}

textarea{
width:100%;
height:160px;
margin-top:15px;
resize:none;
}

</style>

</head>

<body>

<div class="container">

<h1>Consulta Cédula Ecuador 🇪🇨</h1>

<label>Cédula</label>
<input type="text" id="cedulaInput" maxlength="10" placeholder="Ingrese cédula">

<label>Nombres</label>
<input type="text" id="NombreText" disabled>

<label>Apellidos</label>
<input type="text" id="ApellidoText" disabled>

<label>Provincia</label>
<input type="text" id="ProvinciaText" disabled>

<label>Región</label>
<input type="text" id="RegionText" disabled>

<button onclick="consultarCedula()">Consultar</button>

<div id="output">
Ingrese una cédula ecuatoriana de 10 dígitos.
</div>

<label>Respuesta completa del servidor</label>
<textarea id="responseText" readonly></textarea>

</div>

<script>

const provincias = {
1:"Azuay",
2:"Bolívar",
3:"Cañar",
4:"Carchi",
5:"Cotopaxi",
6:"Chimborazo",
7:"El Oro",
8:"Esmeraldas",
9:"Guayas",
10:"Imbabura",
11:"Loja",
12:"Los Ríos",
13:"Manabí",
14:"Morona Santiago",
15:"Napo",
16:"Pastaza",
17:"Pichincha",
18:"Tungurahua",
19:"Zamora Chinchipe",
20:"Galápagos",
21:"Sucumbíos",
22:"Orellana",
23:"Santo Domingo",
24:"Santa Elena"
};

function obtenerRegion(prov){

if(prov<=7 || prov==9 || prov==12 || prov==13 || prov==23 || prov==24)
return "Costa";

if(prov>=1 && prov<=6 || prov==10 || prov==11 || prov==17 || prov==18)
return "Sierra";

if(prov>=14 && prov<=16 || prov>=19 && prov<=22)
return "Amazonía";

if(prov==20)
return "Galápagos";

return "Desconocida";

}

function validarCedula(cedula){

if(!/^\d{10}$/.test(cedula)) return false;

let provincia=parseInt(cedula.substring(0,2));
if(provincia<1 || provincia>24) return false;

let tercerDigito=parseInt(cedula[2]);
if(tercerDigito>=6) return false;

let coef=[2,1,2,1,2,1,2,1,2];
let suma=0;

for(let i=0;i<9;i++){

let val=cedula[i]*coef[i];

if(val>=10) val-=9;

suma+=val;

}

let digitoVerificador=(10-(suma%10))%10;

return digitoVerificador==cedula[9];

}

async function consultarCedula(){

const cedula=document.getElementById("cedulaInput").value.trim();

const nombres=document.getElementById("NombreText");
const apellidos=document.getElementById("ApellidoText");
const provinciaText=document.getElementById("ProvinciaText");
const regionText=document.getElementById("RegionText");

const output=document.getElementById("output");
const responseText=document.getElementById("responseText");

nombres.value="";
apellidos.value="";
provinciaText.value="";
regionText.value="";
responseText.value="";

if(!validarCedula(cedula)){
output.innerHTML="<span style='color:red'>Cédula ecuatoriana inválida</span>";
return;
}

const proxy="https://infoplacas.herokuapp.com/";
const target="https://si.secap.gob.ec/sisecap/logeo_web/json/busca_persona_registro_civil.php";

const data=new URLSearchParams({
documento:cedula,
tipo:1
});

try{

const response=await fetch(proxy+target,{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:data
});

if(!response.ok) throw new Error("Error en la solicitud");

const text=await response.text();

responseText.value=text;

const json=JSON.parse(text);

responseText.value=JSON.stringify(json,null,4);

nombres.value=json.nombres || "";
apellidos.value=json.apellidos || "";

let codProvincia=parseInt(cedula.substring(0,2));

provinciaText.value=provincias[codProvincia] || "Desconocida";

regionText.value=obtenerRegion(codProvincia);

output.innerHTML="<span style='color:green'>Consulta realizada correctamente</span>";

}catch(error){

output.innerHTML="<span style='color:red'>Error: "+error.message+"</span>";

}

}

</script>

</body>
</html>
